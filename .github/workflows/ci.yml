name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json ok')"

      - name: Validate extension syntax
        run: node --check extension.js

      - name: Run regression tests
        run: node --test tests/*.test.js

      - name: Validate helper syntax
        run: bash -n scripts/codex-lb-vscode-select

      - name: Verify pack contents
        run: npm pack --dry-run
